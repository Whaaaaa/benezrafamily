name: Push Reminders

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders
        run: |
          STATUS=$(curl -s -o body.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/aviadmin/cron/reminders")
          echo "HTTP $STATUS"
          cat body.txt
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
